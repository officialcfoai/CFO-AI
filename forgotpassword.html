<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password - CFO AI</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at top,
    #f8fbff 0%,
    #eef5ff 40%,
    #ffffff 100%);
    font-family:'Inter','Segoe UI',sans-serif;
}

/* CARD */
.card{
    width:450px;
    max-width:90%;
    background:rgba(255,255,255,.95);
    border:1px solid rgba(0,0,0,.08);
    border-radius:24px;
    padding:35px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
    backdrop-filter:blur(20px);
    text-align:center;
}

/* HEADER */
h1{
    font-size:32px;
    font-weight:470;
    color:#111;
    margin-bottom:10px;
    letter-spacing:-1px;
}

.subtitle{
    color:#6b7280;
    font-size:17px;
    margin-bottom:25px;
}

/* INPUT */
.input-group{
    text-align:left;
    margin-bottom:15px;
}

label{
    font-size:14px;
    color:#111;
    display:block;
    margin-bottom:6px;
}

input{
    width:100%;
    height:52px;
    border-radius:14px;
    border:1px solid rgba(0,0,0,.1);
    padding:0 15px;
    font-size:15px;
}

input:focus{
    outline:none;
    border-color:#3b82f6;
}

/* BUTTON */
.btn{
    width:100%;
    height:56px;
    border:none;
    border-radius:18px;
    background:#111827;
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
    transition:.2s;
}

.btn:hover{
    transform:translateY(-2px);
}

/* SUCCESS MESSAGE */
.success{
    display:none;
    font-size:16px;
    color:#111;
    line-height:1.5;
    margin-top:10px;
}

/* BACK LINK */
.back{
    margin-top:20px;
    font-size:13px;
}

.back a{
    color:#111;
    text-decoration:none;
    font-weight:600;
}

.back a:hover{
    text-decoration:underline;
}

.page-header{
    text-align:center;
    margin-bottom:25px;
    max-width:450px;
    width:90%;
}

.brand{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-bottom:10px;
}

.brand-name{
    font-size:14px;
    font-weight:500;
    color:#666;
    letter-spacing:0.5px;
}

.status-dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:#22c55e;
    animation:pulseGlow 2s ease-in-out infinite;
}

@keyframes pulseGlow{
    0%{
        transform:scale(1);
        box-shadow:
        0 0 5px rgba(34,197,94,.4),
        0 0 10px rgba(34,197,94,.3);
    }
    50%{
        transform:scale(1.15);
        box-shadow:
        0 0 15px rgba(34,197,94,.9),
        0 0 30px rgba(34,197,94,.7),
        0 0 45px rgba(34,197,94,.4);
    }
    100%{
        transform:scale(1);
        box-shadow:
        0 0 5px rgba(34,197,94,.4),
        0 0 10px rgba(34,197,94,.3);
    }
}

</style>
</head>

<body>

<div class="container">

    <!-- HEADER FUORI DALLA CARD -->
    <div class="page-header">

    <div class="brand">
        <span class="status-dot"></span>
        <span class="brand-name">CFO-AI</span>
    </div>

    <h1>Reimposta password</h1>

    <p class="subtitle">
        Ti invieremo un link per reimpostarla
    </p>

</div>

    <!-- CARD -->
    <div class="card">

        <form id="resetForm">

            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="tu@esempio.com" required>
            </div>

            <button class="btn" type="submit">
                Invia link di reset
            </button>

        </form>

        <div class="success" id="successBox">
            Se esiste un account con questa email, riceverai un link per reimpostare la password a breve.
        </div>

        <div class="back">
            <a href="login.html">← Torna all'accesso</a>
        </div>

    </div>

</div>

<script>

document.getElementById("resetForm").addEventListener("submit", function(e){

    e.preventDefault();

    const email = document.getElementById("email").value;

    console.log("Reset password per:", email);

    // simulazione invio
    document.getElementById("resetForm").style.display = "none";
    document.getElementById("successBox").style.display = "block";

    alert("Link di reset inviato (demo)");
});

</script>

</body>
</html>
