<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFO-AI</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
    background:
        radial-gradient(circle at top,
        #f8fbff 0%,
        #eef5ff 40%,
        #ffffff 100%);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:'Inter','Segoe UI',sans-serif;

    padding-bottom:300px;
}

    .container{
        text-align:center;
    }

  #typing-text{
    display:inline-block;
    font-size:32px;
    font-weight:300;
    color:#111;
    min-height:50px;
    letter-spacing:0.4px;
    line-height:1.4;
    border-right:2px solid #3b82f6;
    padding-right:4px;
    animation:blink 1s infinite;
    white-space:nowrap;
}

    @keyframes blink{
        50%{
            border-color:transparent;
        }
    }

    .container{
    display:flex;
    justify-content:center;
    align-items:center;
}

.message-box{
    width:600px;
    max-width:90%;
    background:rgba(255,255,255,0.95);
    border:1px solid rgba(0,0,0,0.08);
    border-radius:24px;
    padding:30px;
    box-shadow:
        0 10px 30px rgba(0,0,0,0.08),
        0 1px 3px rgba(0,0,0,0.04);
    backdrop-filter:blur(20px);
    transform:perspective(1000px) rotateX(2deg);
}

.message-header{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:14px;
    color:#666;
    margin-bottom:20px;
    font-weight:500;
}

.status-dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:#22c55e;
    animation:pulseGlow 2s ease-in-out infinite;
}

@keyframes pulseGlow{
    0%{
        transform:scale(1);
        box-shadow:
            0 0 5px rgba(34,197,94,.4),
            0 0 10px rgba(34,197,94,.3);
    }

    50%{
        transform:scale(1.15);
        box-shadow:
            0 0 15px rgba(34,197,94,.9),
            0 0 30px rgba(34,197,94,.7),
            0 0 45px rgba(34,197,94,.4);
    }

    100%{
        transform:scale(1);
        box-shadow:
            0 0 5px rgba(34,197,94,.4),
            0 0 10px rgba(34,197,94,.3);
    }
}

#typing-text{
    font-size:32px;
    font-weight:300;
    color:#111;
    min-height:50px;
    letter-spacing:0.4px;
    line-height:1.4;
    border-right:1px solid #111;
    padding-right:4px;
    animation:blink 1s infinite;
}

.bottom-panel{
    position:fixed;
    bottom:0;
    left:50%;
    transform:translateX(-50%);

    width:45%;
    max-width:1200px;
    height:45vh;

    background:rgba(255,255,255,0.95);
    backdrop-filter:blur(20px);

    border-top-left-radius:32px;
    border-top-right-radius:32px;

    border:1px solid rgba(0,0,0,0.08);

    box-shadow:
        0 -10px 30px rgba(0,0,0,0.08);

    padding:40px;

    animation:slideUp 1.2s ease forwards;
}

.panel-handle{
    width:60px;
    height:6px;
    background:#d1d5db;
    border-radius:999px;
    margin:0 auto 25px;
}

.bottom-panel h2{
    font-size:28px;
    font-weight:600;
    margin-bottom:15px;
    color:#111;
}

.bottom-panel p{
    font-size:18px;
    line-height:1.7;
    color:#666;
}

@keyframes slideUp{
    from{
        transform:
            translateX(-50%)
            translateY(100%);
    }

    to{
        transform:
            translateX(-50%)
            translateY(0);
    }
}

.action-btn{
    width:100%;
    height:64px;

    border:none;
    border-radius:18px;

    font-size:24px;
    font-weight:300;
    letter-spacing:0.4px;

    font-family:'Inter','Segoe UI',sans-serif;

    cursor:pointer;

    margin-bottom:18px;

    transition:all .25s ease;
}

.action-btn:hover{
transform:translateY(-2px);
}

.google-btn{
background:#ffffff;
color:#111;


border:1px solid rgba(0,0,0,.1);

box-shadow:
    0 4px 15px rgba(0,0,0,.05);


}

.primary-btn{
background:#111827;
color:white;


box-shadow:
    0 8px 20px rgba(17,24,39,.2);


}

.secondary-btn{
background:#f3f4f6;
color:#111;
}

.google-btn{
    background:#ffffff;
    color:#111;

    border:1px solid rgba(0,0,0,.1);

    box-shadow:
        0 4px 15px rgba(0,0,0,.05);

    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
}

.google-btn img{
    width:24px;
    height:24px;
    object-fit:contain;
}

</style>
</head>
<body>

<div class="container">
    <div class="message-box">
        <div class="message-header">
            <div class="status-dot"></div>
            CFO-AI
        </div>

        <div id="typing-text"></div>
    </div>
</div>

<script>

const textElement = document.getElementById("typing-text");

const texts = [

    "Benvenuto su CFO-AI",

    "Rivoluziona la tua azienda",

    "Automatizza i processi finanziari",

    "Analizza i dati in tempo reale",

    "Prendi decisioni più intelligenti",

    "Cresci con la potenza dell'AI"

];

let textIndex = 0;

let charIndex = 0;

function getRandomSpeed(min, max) {

    return Math.floor(Math.random() * (max - min + 1)) + min;

}

function typeText() {

    const currentText = texts[textIndex];

    if (charIndex < currentText.length) {

        textElement.textContent += currentText.charAt(charIndex);

        charIndex++;

        setTimeout(typeText, getRandomSpeed(70, 130));

    } else {

        setTimeout(deleteText, 1500);

    }

}

function deleteText() {

    if (textElement.textContent.length > 0) {

        textElement.textContent =
            textElement.textContent.slice(0, -1);

        setTimeout(deleteText, 40);

    } else {

        textIndex = (textIndex + 1) % texts.length;

        charIndex = 0;

        setTimeout(typeText, 600);

    }

}

window.addEventListener("load", () => {

    setTimeout(typeText, 500);

});


</script>

<div class="bottom-panel">

    <button class="action-btn google-btn">
        <img src="Google.png" alt="Google">
        <span>Continua con Google</span>
    </button>

    <button
        class="action-btn primary-btn"
        onclick="window.location.href='register.html'">
        Registrati
    </button>

    <button
        class="action-btn secondary-btn"
        onclick="window.location.href='login.html'">
        Accedi
    </button>

</div>

</body>
</html>
